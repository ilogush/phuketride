name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        type: choice
        options:
          - production
          - staging

jobs:
  deploy-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check CODEX Rules
        run: npm run rules:check

      - name: Run Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Accessibility Audit
        run: npm run a11y:audit
        env:
          A11Y_FAIL_LEVEL: medium

      - name: Run Live Security Audit
        run: npm run security:audit:live

      - name: Pre-launch Verification (Deploy Mode)
        run: npm run pre-launch:deploy
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    runs-on: ubuntu-latest
    needs: deploy-gate
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate SESSION_SECRET
        run: |
          if [ -z "$SESSION_SECRET" ]; then
            echo "Missing required secret: SESSION_SECRET"
            exit 1
          fi
          if [ ${#SESSION_SECRET} -lt 32 ]; then
            echo "SESSION_SECRET must be at least 32 characters long"
            exit 1
          fi
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}

      - name: Run Migrations
        run: npm run db:migrate:remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Workers
        run: wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Set SESSION_SECRET
        run: wrangler secret put SESSION_SECRET <<< "$SESSION_SECRET"
        env:
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke Test Checklist
        run: |
          echo "Deployment successful. Validate:"
          echo "1. Login/logout flow"
          echo "2. Admin mod-mode access"
          echo "3. Cross-tenant access rejection"
          echo "4. Public checkout pricing"
          echo "5. Sensitive route access control"
