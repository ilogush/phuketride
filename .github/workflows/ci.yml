name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  fast-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check CODEX Rules
        run: npm run rules:check

  quality-check:
    runs-on: ubuntu-latest
    needs: fast-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install
        run: npm ci

      - name: Run Tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Accessibility Audit
        run: npm run a11y:audit
        env:
          A11Y_FAIL_LEVEL: medium

      - name: Lint
        run: npm run lint

  security-audit:
    runs-on: ubuntu-latest
    needs: quality-check
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Live Security Audit
        run: npm run security:audit:live

  ci-gate:
    runs-on: ubuntu-latest
    needs: [quality-check, security-audit]
    if: always()
    steps:
      - name: Check required jobs passed
        run: |
          if [ "${{ needs.quality-check.result }}" != "success" ] || \
             [ "${{ needs.security-audit.result }}" != "success" ]; then
            echo "quality-check: ${{ needs.quality-check.result }}"
            echo "security-audit: ${{ needs.security-audit.result }}"
            exit 1
          fi
          echo "CI gate passed"
